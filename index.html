<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Rock Paper Scissors</title>
    <link rel="stylesheet" href="assets/style/style.css" />
    <script
      src="https://kit.fontawesome.com/454af3cade.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main>
      <div class="score">
        <div class="score-container">
          <h2>Player</h2>
          <p>0</p>
        </div>
        <div class="score-container">
          <h2>Computer</h2>
          <p>0</p>
        </div>
      </div>
      <h1>Choose your move!</h1>
      <div class="illustration">
        <div class="illustration-container">
          <span style="display: inline-block">
            <i class="fa-regular fa-hand-back-fist fa-8x fa-rotate-90"></i
          ></span>
        </div>
        <div class="illustration-container">
          <span class="fa-flip-vertical" style="display: inline-block">
            <i
              class="fa-regular fa-hand-back-fist fa-8x fa-rotate-by"
              style="--fa-rotate-angle: -90deg"
            ></i>
          </span>
        </div>
      </div>
      <div class="player-move">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
      </div>
    </main>
    <footer>
      <p>Copyright &#169; Adhitya Aditama Nugraha | The Odin Project 2023</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>

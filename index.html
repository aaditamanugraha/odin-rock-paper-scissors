<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Rock Paper Scissors</title>
  </head>
  <body>
    <main>
      <div class="score">
        <div class="player-score">
          <h2>Player</h2>
        </div>
        <div class="computer-score">
          <h2>Computer</h2>
        </div>
      </div>
      <h1>Choose your move!</h1>
      <div class="illustration">
        <div class="player-illustration"></div>
        <div class="computer-illustration"></div>
      </div>
      <div class="player-move">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
      </div>
    </main>
    <footer>
      <p>Copyright &#169; Adhitya Aditama Nugraha | The Odin Project 2023</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
